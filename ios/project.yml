# XcodeGen spec for Voice Diary.
#
# Run `xcodegen generate` from this directory after each schema change to
# regenerate `VoiceDiary.xcodeproj`. The generated project is gitignored
# (see ../.gitignore) — `project.yml` is the source of truth.
#
# Install xcodegen:
#     brew install xcodegen

name: VoiceDiary
options:
  bundleIdPrefix: com.tomorrowflow
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: de
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_UPCOMING_FEATURE_EXISTENTIAL_ANY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    DEVELOPMENT_TEAM: 9T79756W9V

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: 0.12.4

targets:
  VoiceDiary:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/Geist-Variable.ttf
        buildPhase: resources
      - path: Resources/GeistMono-Variable.ttf
        buildPhase: resources
      - path: Resources/Geist-OFL.txt
        buildPhase: resources
      - path: Resources/Models
        buildPhase: resources
        optional: true
    info:
      # IMPORTANT: this block is the source of truth for Config/Info.plist.
      # XcodeGen regenerates the plist from `properties` on every run —
      # any hand-added keys will be silently dropped. Add new keys HERE.
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: Voice Diary
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
        NSMicrophoneUsageDescription: "Voice Diary nimmt deine Sprache auf, um den Tag chronologisch zu reflektieren. (Voice Diary records your speech to walk through your day chronologically.)"
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - "Geist-Variable.ttf"
          - "GeistMono-Variable.ttf"
        # Tailscale traffic (`*.ts.net`) is encrypted at the transport layer;
        # we relax ATS only for that hostname, not arbitrary HTTP.
        NSAppTransportSecurity:
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
        # Custom URL scheme used by the lock-screen widget Link to deep-link
        # back into the app (`voicediary://capture/start`).
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - voicediary
            CFBundleURLName: com.tomorrowflow.voice-diary
        # NSSupportsLiveActivities is required for ActivityKit Live Activities.
        NSSupportsLiveActivities: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomorrowflow.voice-diary
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Config/VoiceDiary.entitlements
    dependencies:
      - package: FluidAudio
      - target: VoiceDiaryWidget
        embed: true
        codeSign: true

  VoiceDiaryWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WidgetExtension
      - path: Sources/Shared
    info:
      path: WidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: Voice Diary
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tomorrowflow.voice-diary.widget
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: WidgetExtension/VoiceDiaryWidget.entitlements
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"

  VoiceDiaryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: VoiceDiary

schemes:
  VoiceDiary:
    build:
      targets:
        VoiceDiary: all
        VoiceDiaryWidget: all
        VoiceDiaryTests: [test]
    test:
      targets:
        - VoiceDiaryTests
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
